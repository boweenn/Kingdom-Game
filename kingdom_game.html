<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;width:100vw;height:100vh;background:#7a6e67;user-select:none;}
#game{width:100vw;height:100vh;position:relative;}
#bg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;background:#7a6e67;z-index:1;}
#frame{position:absolute;z-index:2;pointer-events:none;}
#frame>*{pointer-events:auto;}
#char{
  position:absolute;bottom:1%;right:5%;height:auto;
  object-fit:contain;z-index:3;image-rendering:crisp-edges;
  transition:right 0.7s cubic-bezier(0.25,0.46,0.45,0.94);
}
/* STATS */
#stats{position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:10px;z-index:10;}
.stat-row{display:flex;align-items:center;gap:8px;}
.stat-icon{width:40px;height:40px;image-rendering:crisp-edges;}
.bar-wrap{width:72px;height:10px;background:rgba(0,0,0,0.4);border-radius:5px;overflow:hidden;}
.bar{height:100%;border-radius:5px;transition:width 0.5s;}
#bar-gold{background:linear-gradient(90deg,#f5b800,#ffe066);}
#bar-pop{background:linear-gradient(90deg,#3db8e8,#8de0ff);}
#bar-happy{background:linear-gradient(90deg,#44cc44,#aaffaa);}
.num-disp{display:flex;align-items:center;height:22px;gap:1px;}
.num-disp canvas{height:100%;width:auto;image-rendering:crisp-edges;}
/* DIALOG BOX */
#dlg-img{position:absolute;top:12px;right:12px;width:750px;height:auto;z-index:20;display:none;}
#dlg-canvas{position:absolute;top:12px;right:12px;width:750px;height:auto;z-index:21;display:none;}
/* YES/NO BUTTON - bottom left corner, only shown during questions */
#yesno-btn{
  position:absolute;
  bottom:10px;
  left:10px;
  width:150px;
  height:auto;
  z-index:25;
  display:none;
  cursor:pointer;
  image-rendering:crisp-edges;
}
/* END */
#end{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;background:#ffffff;flex-direction:column;gap:20px;}
#end-title{font-family:serif;font-size:48px;font-weight:bold;color:#222;text-align:center;max-width:700px;}
#end-desc{font-family:serif;font-size:24px;color:#444;text-align:center;max-width:600px;line-height:1.5;}
#end-restart{font-family:serif;font-size:18px;color:#888;text-align:center;margin-top:20px;}
/* TITLE */
#title{position:absolute;inset:0;z-index:50;}
#title img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;background:#7a6e67;}
#play-hit{position:absolute;left:35.2%;top:65.1%;width:26.7%;height:9.5%;z-index:51;cursor:pointer;background:transparent;border:none;}
#play-hit:hover{filter:brightness(1.3);}
</style>

// Frame sizing
function fitFrame(){
  const bg=document.getElementById('bg');
  const iw=bg.naturalWidth,ih=bg.naturalHeight;
  if(!iw||!ih){setTimeout(fitFrame,100);return;}
  const vw=window.innerWidth,vh=window.innerHeight;
  const scale=Math.min(vw/iw,vh/ih);
  const rw=Math.round(iw*scale),rh=Math.round(ih*scale);
  const fr=document.getElementById('frame');
  fr.style.left=Math.round((vw-rw)/2)+'px';
  fr.style.top=Math.round((vh-rh)/2)+'px';
  fr.style.width=rw+'px';
  fr.style.height=rh+'px';
  const dc=document.getElementById('dlg-canvas');
  dc.width=rw;dc.height=rh;
}
window.addEventListener('resize',fitFrame);

// Asset loading
function loadImg(src){return new Promise(res=>{const i=new Image();i.onload=()=>res(i);i.onerror=()=>{console.warn('failed:',src);res(null);};i.src=src;});}
function cropToCanvas(src,sx,sy,sw,sh){
  const c=document.createElement('canvas');c.width=sw;c.height=sh;
  const ctx=c.getContext('2d');ctx.drawImage(src,sx,sy,sw,sh,0,0,sw,sh);
  const d=ctx.getImageData(0,0,sw,sh);
  for(let i=0;i<d.data.length;i+=4)if(d.data[i]>240&&d.data[i+1]>240&&d.data[i+2]>240)d.data[i+3]=0;
  ctx.putImageData(d,0,0);return c;
}
function paintIcon(id,c){const d=document.getElementById(id);d.width=c.width;d.height=c.height;d.getContext('2d').drawImage(c,0,0);}

// Text drawing
function getLetter(ch){
  if(ch>='A'&&ch<='Z')return LI['U'+ch]||null;
  if(ch>='a'&&ch<='z')return LI[ch]||null;
  if(ch==='.')return LI['dot']||null;
  if(ch===',')return LI['comma']||null;
  if(ch==='!')return LI['excl']||null;
  if(ch==='?')return LI['quest']||null;
  return null;
}
function charW(ch,size){
  if(ch===' ')return size*0.38;
  const lc=getLetter(ch);
  return lc&&lc.height>0?size*lc.width/lc.height+1:size*0.5;
}
function measureLine(text,size){return text.split('').reduce((a,c)=>a+charW(c,size),0);}
function drawLine(ctx,text,size,dx,dy){
  for(const ch of text){
    if(ch===' '){dx+=size*0.38;continue;}
    const lc=getLetter(ch);
    if(lc){const w=size*lc.width/lc.height;ctx.drawImage(lc,dx,dy,w,size);dx+=w+1;}
  }
}
function drawWrapped(ctx,text,size,x,y,maxW,lineH){
  const words=text.split(' ');const lines=[];let cur='';
  for(const w of words){const t=cur?cur+' '+w:w;if(measureLine(t,size)>maxW&&cur){lines.push(cur);cur=w;}else cur=t;}
  if(cur)lines.push(cur);
  lines.forEach((ln,i)=>drawLine(ctx,ln,size,x,y+i*lineH));
}
function renderNum(el,val){
  el.innerHTML='';
  for(const d of String(val)){
    if(!NI[d])continue;
    const c=document.createElement('canvas');const h=22;
    c.height=h;c.width=Math.round(h*NI[d].width/NI[d].height);
    c.style.cssText=`height:${h}px;width:${c.width}px;image-rendering:crisp-edges`;
    c.getContext('2d').drawImage(NI[d],0,0,c.width,c.height);
    el.appendChild(c);
  }
}

const NAME_SIZE=30,BODY_SIZE=25,BTN_SIZE=20;
const CHAR_SIZES={minister:'120%',general:'85%',journalist:'60%',notepad:'60%',devil:'75%',civilian:'70%'};
const CHAR_BOTTOMS={minister:'-15%',general:'-10%',journalist:'-3%',notepad:'-5%',devil:'-5%',civilian:'-3%'};

function drawDialog(canvasId,name,text,isQuestion){
  const c=document.getElementById(canvasId);
  const W=c.width,H=c.height;
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,W,H);
  const tx=Math.round(W*0.53);
  const ty=Math.round(H*0.072);
  const tmaxW=Math.round(W*0.4);
  drawLine(ctx,name.toUpperCase(),NAME_SIZE,tx,ty);
  drawWrapped(ctx,text,BODY_SIZE,tx,ty+NAME_SIZE+6,tmaxW,BODY_SIZE+4);
  const s=isQuestion?"yes or no":"space";
  const sw=measureLine(s,BTN_SIZE);
  const bx=Math.round(W*0.85);
  const by=Math.round(H*0.320);
  drawLine(ctx,s,BTN_SIZE,bx-Math.round(sw/2),by-Math.round(BTN_SIZE/2));







}

function dlgClick(e){
  if(phase==='dialog'&&spaceAction){const f=spaceAction;spaceAction=null;f();}
}

// YES/NO button click
// The source image (1270x952) has YES at ~y 4%-20% and NO at ~y 25%-41% of image height
function yesnoBtnClick(e){
  if(phase!=='question')return;
  const img=document.getElementById('yesno-btn');
  const r=img.getBoundingClientRect();
  const pct=(e.clientY-r.top)/r.height;
  if(pct>=0.05&&pct<=0.38){answer(true);return;}
  if(pct>=0.55&&pct<=0.90){answer(false);return;}
}

// Stats
function updStats(){

  document.getElementById('bar-happy').style.width=S.happy+'%';
  renderNum(document.getElementById('num-gold'),S.gold);
  renderNum(document.getElementById('num-pop'),S.pop);
  renderNum(document.getElementById('num-happy'),S.happy);
}

function startGame(){document.getElementById('title').style.display='none';nextTurn();}
function restartGame(){document.getElementById('end').style.display='none';S={gold:50,pop:50,happy:50,turn:0};nextTurn();}
document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();if(phase==='dialog'&&spaceAction){const f=spaceAction;spaceAction=null;f();}}
  if(e.code==='KeyY'&&phase==='question'){answer(true);}
  if(e.code==='KeyN'&&phase==='question'){answer(false);}
});

function showDialog(name,text,isQuestion,cb){
  phase=isQuestion?'question':'dialog';
  spaceAction=isQuestion?null:cb;
  document.getElementById('dlg-img').style.display='block';
  document.getElementById('dlg-canvas').style.display='block';
  drawDialog('dlg-canvas',name,text,isQuestion);
  showYesNo(isQuestion);
}

function nextTurn(){
  if(S.turn>=Qs.length){checkEnd();return;}
  curQ=Qs[S.turn];updStats();
  const ch=document.getElementById('char');
  ch.style.transition='none';ch.style.right='-40%';
  ch.src=CHARS[curQ.pt]||CHARS.minister;
  ch.style.height=CHAR_SIZES[curQ.pt]||'55%';
  ch.style.bottom=CHAR_BOTTOMS[curQ.pt]||'2%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ch.style.transition='right 0.7s cubic-bezier(0.25,0.46,0.45,0.94)';ch.style.right='0%';
  }));
  showDialog(curQ.sp,curQ.intro,false,()=>showDialog(curQ.sp,curQ.q,true,null));
}

const DEVIL_DEALS=[
  {cost:{pop:-15},msg:"Fifteen souls vanish in the night. The journalist wakes up confused."},
  {cost:{happy:-20},msg:"A wave of dread sweeps the kingdom. The journalist forgets everything."},
  {cost:{gold:-25},msg:"A chest of gold disappears. The journalist finds a better story elsewhere."},
  {cost:{pop:-10,happy:-10},msg:"People grow fearful and miserable. The journalist moves on."},
  {cost:{gold:-15,pop:-10},msg:"Gold and lives traded in shadow. The headline is buried forever."},
];
let devilPending=null;

function devilDeal(){
  const deal=DEVIL_DEALS[Math.floor(Math.random()*DEVIL_DEALS.length)];
  devilPending=deal;
  const ch=document.getElementById('char');
  ch.style.transition='none';ch.style.right='-40%';
  ch.src=CHARS.devil;
  ch.style.height=CHAR_SIZES.devil;
  ch.style.bottom=CHAR_BOTTOMS.devil;
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    ch.style.transition='right 0.7s cubic-bezier(0.25,0.46,0.45,0.94)';ch.style.right='0%';
  }));
  const parts=[];
  if(deal.cost.pop)parts.push(Math.abs(deal.cost.pop)+' lives');
  if(deal.cost.happy)parts.push(Math.abs(deal.cost.happy)+' happiness');
  if(deal.cost.gold)parts.push(Math.abs(deal.cost.gold)+' gold');
  showDialog('THE DEVIL','I can make that journalist forget. It will only cost you '+parts.join(', ')+'. Deal?',true,null);
}

function answer(yes){
  if(busy||phase!=='question')return;busy=true;
  showYesNo(false);
  if(devilPending){
    const deal=devilPending;
    devilPending=null;
    if(yes){
      if(deal.cost.gold)S.gold+=deal.cost.gold;
      if(deal.cost.pop)S.pop+=deal.cost.pop;
      if(deal.cost.happy)S.happy+=deal.cost.happy;
      updStats();
      showDialog('THE DEVIL',deal.msg,false,()=>{
        busy=false;
        if(S.gold<=0){showEnd('BANKRUPT','The treasury is empty. Chaos erupts. You are deposed.');return;}
        if(S.pop<=0){showEnd('DESERTED','Every soul has fled. You sit alone on an empty throne.');return;}
        if(S.happy<=0){showEnd('REVOLUTION','The people storm the palace. Your reign ends tonight.');return;}
        nextTurn();
      });
    } else {
      showDialog('THE DEVIL','Heh. Your loss, your majesty.',false,()=>{busy=false;nextTurn();});
    }
    return;
  }
  const wasJournalist=curQ.pt==='journalist';
  const r=yes?curQ.yes:curQ.no;
  S.gold+=r.gold;S.pop+=r.pop;S.happy+=r.happy;updStats();S.turn++;
  showDialog(curQ.sp,r.msg,false,()=>{
    busy=false;
    if(S.gold<=0){showEnd('BANKRUPT','The treasury is empty. Chaos erupts. You are deposed.');return;}
    if(S.pop<=0){showEnd('DESERTED','Every soul has fled. You sit alone on an empty throne.');return;}
    if(S.happy<=0){showEnd('REVOLUTION','The people storm the palace. Your reign ends tonight.');return;}
    if(wasJournalist){devilDeal();return;}
    nextTurn();
  });
}

function checkEnd(){
  const avg=(S.gold+S.pop+S.happy)/3,g=S.gold,p=S.pop,h=S.happy;
  if(g<=5&&p<=5&&h<=5){showEnd('TOTAL COLLAPSE','Nothing remains. The throne sits empty forever.');return;}
  if(g<=5&&p<=5){showEnd('GHOST KINGDOM','Bankrupt and deserted. Only crows remain.');return;}
  if(g<=5&&h<=5){showEnd('BITTER RUIN','A penniless tyrant. The people spit your name as they flee.');return;}
  if(p<=5&&h<=5){showEnd('THE CURSED THRONE','Your people vanished hating you. Historians call it the Age of Shame.');return;}
  if(g<=5){showEnd('ECONOMIC RUIN','The treasury is bare. The kingdom crumbles from within.');return;}
  if(p<=5){showEnd('EMPTY KINGDOM','Farms lie abandoned. Too many people left for good.');return;}
  if(h<=5){showEnd('HATED TYRANT','They call you the Misery King for a thousand years.');return;}
  if(avg>=75&&g>=70&&p>=70&&h>=70){showEnd('THE LEGENDARY REIGN','Bards weep composing your ballads. Greatest ruler in living memory.');return;}
  if(avg>=65&&g>=55&&p>=55&&h>=55){showEnd('THE GOLDEN AGE','Gold overflows, people thrive, and laughter fills every street.');return;}
  if(g>=80&&p>=50&&h>=50){showEnd('THE MERCHANT KING','Your kingdom is the richest in all the land.');return;}
  if(p>=80&&g>=50&&h>=50){showEnd('THE PEOPLES KING','Future generations carry your name with pride.');return;}
  if(h>=80&&g>=50&&p>=50){showEnd('THE BELOVED KING','No king was ever so cherished.');return;}
  if(avg>=60){showEnd('A PROSPEROUS REALM','Not perfect but good. Your people want for little.');return;}
  if(g<25&&p<25){showEnd('THE FORGOTTEN FRONTIER','Poor and empty. Your lands fade from every map.');return;}
  if(g<25){showEnd('BORROWED THRONE','You spent every coin. Foreign creditors own your castle.');return;}
  if(p<25){showEnd('BARREN LANDS','Few remain. Enemies circle like wolves.');return;}
  if(h<25){showEnd('FORGOTTEN KING','You ruled joylessly. Your name erased within a generation.');return;}
  if(avg>=50){showEnd('MEDIOCRE REIGN','Your kingdom survives but history forgets your name.');return;}
  showEnd('THE GRAY YEARS','A kingdom neither flourishing nor dead. Just existing.');
}

function showEnd(title,desc){
  phase='end';
  showYesNo(false);
  document.getElementById('dlg-img').style.display='none';
  document.getElementById('dlg-canvas').style.display='none';
  document.getElementById('end-title').textContent=title;
  document.getElementById('end-desc').textContent=desc;
  document.getElementById('end').style.display='flex';
}

init();
</script>
